name: "Convert to DietPi"
author: "Yumi"
description: "Convert Armbian image to DietPi"
inputs:
  image_name:
    description: "Name of the Armbian image artifact to convert"
    required: true
  hw_model:
    description: "DietPi hardware model ID (25 = Generic Allwinner H3)"
    required: false
    default: "25"
  distro_target:
    description: "Debian version (6=Bullseye, 7=Bookworm, 8=Trixie)"
    required: false
    default: "8"

runs:
  using: "composite"
  steps:
    - name: Install dependencies
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y qemu-user-static binfmt-support parted kpartx xz-utils

    - name: Download Armbian image artifact
      uses: actions/download-artifact@v4
      with:
        name: ${{ inputs.image_name }}.img.xz
        path: ./dietpi-work

    - name: Extract image
      shell: bash
      run: |
        cd ./dietpi-work
        echo "Extracting image..."
        xz -d -k ${{ inputs.image_name }}.img.xz || unxz -k ${{ inputs.image_name }}.img.xz
        ls -la

    - name: Mount image and convert to DietPi
      shell: bash
      run: |
        set -e
        cd ./dietpi-work
        IMG_FILE="${{ inputs.image_name }}.img"

        echo "========================================"
        echo "DietPi Conversion Starting"
        echo "HW_MODEL: ${{ inputs.hw_model }}"
        echo "DISTRO_TARGET: ${{ inputs.distro_target }}"
        echo "========================================"

        echo "Setting up loop device..."
        sudo losetup -fP "$IMG_FILE"
        LOOP_DEV=$(sudo losetup -j "$IMG_FILE" | cut -d: -f1)
        echo "Loop device: $LOOP_DEV"

        # Find root partition (usually p1 or p2)
        if [ -b "${LOOP_DEV}p2" ]; then
          ROOT_PART="${LOOP_DEV}p2"
          BOOT_PART="${LOOP_DEV}p1"
        else
          ROOT_PART="${LOOP_DEV}p1"
          BOOT_PART=""
        fi
        echo "Root partition: $ROOT_PART"
        echo "Boot partition: $BOOT_PART"

        # Mount root filesystem
        sudo mkdir -p /mnt/dietpi
        sudo mount "$ROOT_PART" /mnt/dietpi

        # Mount boot if separate
        if [ -n "$BOOT_PART" ]; then
          sudo mkdir -p /mnt/dietpi/boot
          sudo mount "$BOOT_PART" /mnt/dietpi/boot
        fi

        # Setup chroot
        sudo mount --bind /dev /mnt/dietpi/dev
        sudo mount --bind /dev/pts /mnt/dietpi/dev/pts
        sudo mount --bind /proc /mnt/dietpi/proc
        sudo mount --bind /sys /mnt/dietpi/sys

        # Copy DNS configuration for network access in chroot
        sudo rm -f /mnt/dietpi/etc/resolv.conf
        sudo cp -L /etc/resolv.conf /mnt/dietpi/etc/resolv.conf

        # Copy QEMU binary for ARM emulation
        sudo cp /usr/bin/qemu-arm-static /mnt/dietpi/usr/bin/ 2>/dev/null || true
        sudo cp /usr/bin/qemu-aarch64-static /mnt/dietpi/usr/bin/ 2>/dev/null || true

        # Create a fake systemctl wrapper for chroot environment
        cat << 'FAKESYSTEMCTL' | sudo tee /mnt/dietpi/usr/local/bin/systemctl > /dev/null
        #!/bin/bash
        # Fake systemctl for chroot environments where systemd is not running
        ACTION=""
        SERVICES=()
        while [[ $# -gt 0 ]]; do
          case "$1" in
            enable|disable|mask|unmask|start|stop|restart|reload|daemon-reload|daemon-reexec|is-enabled|is-active|status|preset|reset-failed)
              ACTION="$1" ;;
            -*) ;; # Ignore flags
            *) SERVICES+=("$1") ;;
          esac
          shift
        done
        # Commands that should just succeed silently
        if [[ "$ACTION" =~ ^(daemon-reload|daemon-reexec|start|stop|restart|reload|reset-failed|preset)$ ]]; then
          exit 0
        fi
        # Status checks
        if [[ "$ACTION" == "status" ]] || [[ "$ACTION" == "is-active" ]]; then
          echo "inactive"
          exit 3
        fi
        if [[ "$ACTION" == "is-enabled" ]]; then
          echo "disabled"
          exit 1
        fi
        for SERVICE in "${SERVICES[@]}"; do
          SERVICE_NAME="${SERVICE%.service}"
          SERVICE_FILE="${SERVICE_NAME}.service"
          case "$ACTION" in
            enable)
              mkdir -p /etc/systemd/system/multi-user.target.wants
              if [[ -f "/lib/systemd/system/$SERVICE_FILE" ]]; then
                ln -sf "/lib/systemd/system/$SERVICE_FILE" "/etc/systemd/system/multi-user.target.wants/$SERVICE_FILE" 2>/dev/null || true
              elif [[ -f "/usr/lib/systemd/system/$SERVICE_FILE" ]]; then
                ln -sf "/usr/lib/systemd/system/$SERVICE_FILE" "/etc/systemd/system/multi-user.target.wants/$SERVICE_FILE" 2>/dev/null || true
              fi ;;
            disable)
              rm -f "/etc/systemd/system/multi-user.target.wants/$SERVICE_FILE" 2>/dev/null || true
              rm -f "/etc/systemd/system/$SERVICE_FILE" 2>/dev/null || true ;;
            mask)
              ln -sf /dev/null "/etc/systemd/system/$SERVICE_FILE" 2>/dev/null || true ;;
            unmask)
              if [[ -L "/etc/systemd/system/$SERVICE_FILE" ]]; then
                TARGET=$(readlink "/etc/systemd/system/$SERVICE_FILE")
                if [[ "$TARGET" == "/dev/null" ]]; then
                  rm -f "/etc/systemd/system/$SERVICE_FILE"
                fi
              fi ;;
          esac
        done
        exit 0
        FAKESYSTEMCTL

        sudo chmod +x /mnt/dietpi/usr/local/bin/systemctl

        # Create wrapper for systemd-detect-virt (returns "none" in chroot)
        echo -e '#!/bin/bash\necho "none"\nexit 0' | sudo tee /mnt/dietpi/usr/local/bin/systemd-detect-virt > /dev/null
        sudo chmod +x /mnt/dietpi/usr/local/bin/systemd-detect-virt

        # Ensure /usr/local/bin is first in PATH
        sudo mkdir -p /mnt/dietpi/etc/profile.d
        echo 'export PATH="/usr/local/bin:$PATH"' | sudo tee /mnt/dietpi/etc/profile.d/local-bin-path.sh > /dev/null
        sudo chmod +x /mnt/dietpi/etc/profile.d/local-bin-path.sh

        # Download DietPi installer
        echo "Downloading DietPi installer..."
        sudo wget -O /mnt/dietpi/tmp/dietpi-installer https://raw.githubusercontent.com/MichaIng/DietPi/master/.build/images/dietpi-installer
        sudo chmod +x /mnt/dietpi/tmp/dietpi-installer

        # Diagnostic: Check Debian version in image
        echo "=== PRE-INSTALL DIAGNOSTICS ==="
        echo "Debian version in image:"
        sudo cat /mnt/dietpi/etc/debian_version || echo "NOT FOUND"
        echo "OS Release:"
        sudo cat /mnt/dietpi/etc/os-release | head -5 || echo "NOT FOUND"
        echo "==============================="

        # Create the automation script with proper variable handling
        cat << DIETPI_SCRIPT | sudo tee /mnt/dietpi/tmp/dietpi-automation.sh > /dev/null
        #!/bin/bash
        set -x
        # Export all required variables
        export PATH="/usr/local/bin:\$PATH"
        export GITOWNER="MichaIng"
        export GITBRANCH="master"
        export HW_MODEL="${{ inputs.hw_model }}"
        export WIFI_REQUIRED=1
        export DISTRO_TARGET="${{ inputs.distro_target }}"
        export IMAGE_CREATOR="Yumi"
        export PREIMAGE_INFO="Armbian"

        echo "========================================"
        echo "DietPi Installer Variables:"
        echo "HW_MODEL=\$HW_MODEL"
        echo "DISTRO_TARGET=\$DISTRO_TARGET"
        echo "GITOWNER=\$GITOWNER"
        echo "GITBRANCH=\$GITBRANCH"
        echo "========================================"
        echo "System Info:"
        cat /etc/debian_version
        uname -a
        echo "========================================"

        # Run DietPi installer
        /tmp/dietpi-installer

        INSTALLER_EXIT=\$?
        echo "DietPi installer exit code: \$INSTALLER_EXIT"

        # Verify installation state
        echo "=== POST-INSTALL CHECK ==="
        if [[ -f /boot/dietpi/.install_stage ]]; then
            echo "Install stage: \$(cat /boot/dietpi/.install_stage)"
        else
            echo "WARNING: .install_stage not found!"
        fi
        if [[ -d /boot/dietpi ]]; then
            echo "Contents of /boot/dietpi:"
            ls -la /boot/dietpi/
        fi
        if [[ -f /boot/dietpi.txt ]]; then
            echo "dietpi.txt exists"
        else
            echo "WARNING: dietpi.txt not found!"
        fi
        echo "=========================="

        exit \$INSTALLER_EXIT
        DIETPI_SCRIPT

        sudo chmod +x /mnt/dietpi/tmp/dietpi-automation.sh

        # Run DietPi conversion
        echo "Running DietPi conversion..."
        set +e
        sudo chroot /mnt/dietpi /bin/bash -c "export PATH=/usr/local/bin:\$PATH && /tmp/dietpi-automation.sh" 2>&1 | tee /tmp/dietpi-install.log
        CHROOT_EXIT=${PIPESTATUS[0]}
        set -e

        echo "Chroot exit code: $CHROOT_EXIT"

        # Check and fix install state if needed
        if [[ ! -f /mnt/dietpi/boot/dietpi/.install_stage ]]; then
            echo "WARNING: Install stage file not found, creating it..."
            sudo mkdir -p /mnt/dietpi/boot/dietpi
            # Stage -1 = first run setup pending (correct value for fresh image)
            echo "-1" | sudo tee /mnt/dietpi/boot/dietpi/.install_stage
        fi

        # Verify DietPi files exist
        echo "Checking DietPi installation..."
        if [[ -d /mnt/dietpi/boot/dietpi ]]; then
            echo "DietPi boot directory exists"
            ls -la /mnt/dietpi/boot/dietpi/ || true
        else
            echo "ERROR: /boot/dietpi directory not found!"
        fi

        if [[ -f /mnt/dietpi/boot/dietpi.txt ]]; then
            echo "dietpi.txt exists"
        else
            echo "WARNING: dietpi.txt not found"
        fi

        # Ensure proper permissions
        sudo chmod 644 /mnt/dietpi/boot/dietpi/.install_stage 2>/dev/null || true

        # Cleanup chroot artifacts
        echo "Cleaning up chroot..."
        sudo rm -f /mnt/dietpi/usr/bin/qemu-arm-static
        sudo rm -f /mnt/dietpi/usr/bin/qemu-aarch64-static
        sudo rm -f /mnt/dietpi/tmp/dietpi-installer
        sudo rm -f /mnt/dietpi/tmp/dietpi-automation.sh
        sudo rm -f /mnt/dietpi/usr/local/bin/systemctl
        sudo rm -f /mnt/dietpi/usr/local/bin/systemd-detect-virt
        sudo rm -f /mnt/dietpi/etc/profile.d/local-bin-path.sh

        # Restore original resolv.conf symlink for systemd-resolved
        sudo rm -f /mnt/dietpi/etc/resolv.conf
        sudo ln -sf /run/systemd/resolve/stub-resolv.conf /mnt/dietpi/etc/resolv.conf 2>/dev/null || true

        # Unmount in reverse order
        echo "Unmounting filesystems..."
        sync
        sudo umount /mnt/dietpi/sys 2>/dev/null || true
        sudo umount /mnt/dietpi/proc 2>/dev/null || true
        sudo umount /mnt/dietpi/dev/pts 2>/dev/null || true
        sudo umount /mnt/dietpi/dev 2>/dev/null || true
        sudo umount /mnt/dietpi/boot 2>/dev/null || true
        sudo umount /mnt/dietpi 2>/dev/null || true

        # Detach loop device
        sudo losetup -d "$LOOP_DEV"

        echo "========================================"
        echo "DietPi conversion completed!"
        echo "========================================"

    - name: Rename and compress DietPi image
      shell: bash
      run: |
        cd ./dietpi-work
        # Transform Yumi-smartpi1-bookworm-debian12-server-date -> smartpi1-DietPi-bookworm-debian12-server-date
        # Input now already contains Debian version (e.g., bookworm-debian12)
        # Extract board name (smartpi1 or smartpad)
        BOARD=$(echo "${{ inputs.image_name }}" | sed 's/^Yumi-\([^-]*\)-.*/\1/')
        # Extract the rest (codename-debianXX-type-date)
        REST=$(echo "${{ inputs.image_name }}" | sed 's/^Yumi-[^-]*-//')
        # Build new name: board-DietPi-rest
        DIETPI_NAME="${BOARD}-DietPi-${REST}"
        echo "Renaming to: ${DIETPI_NAME}"
        mv "${{ inputs.image_name }}.img" "${DIETPI_NAME}.img"

        echo "Compressing DietPi image..."
        xz -efkvzT0 "${DIETPI_NAME}.img"

        echo "Calculating checksum..."
        sha256sum "${DIETPI_NAME}.img.xz" > "${DIETPI_NAME}.img.xz.sha256"

        echo "DIETPI_IMAGE_NAME=${DIETPI_NAME}" >> $GITHUB_ENV
        ls -la

    - name: Upload DietPi image
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.DIETPI_IMAGE_NAME }}.img.xz
        path: ./dietpi-work/${{ env.DIETPI_IMAGE_NAME }}.img.xz

    - name: Upload DietPi checksum
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.DIETPI_IMAGE_NAME }}.img.xz.sha256
        path: ./dietpi-work/${{ env.DIETPI_IMAGE_NAME }}.img.xz.sha256
