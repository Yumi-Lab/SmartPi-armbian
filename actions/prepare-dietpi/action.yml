name: "Prepare DietPi-Ready Image"
author: "Yumi"
description: "Prepare Armbian image for DietPi first-boot installation (no QEMU)"
inputs:
  image_name:
    description: "Name of the Armbian image artifact to prepare"
    required: true
  hw_model:
    description: "DietPi hardware model ID (25 = Generic Allwinner H3)"
    required: false
    default: "25"
  distro_target:
    description: "Debian version (6=Bullseye, 7=Bookworm, 8=Trixie)"
    required: false
    default: "8"

runs:
  using: "composite"
  steps:
    - name: Install dependencies
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y parted kpartx xz-utils wget

    - name: Download Armbian image artifact
      uses: actions/download-artifact@v4
      with:
        name: ${{ inputs.image_name }}.img.xz
        path: ./dietpi-work

    - name: Extract image
      shell: bash
      run: |
        cd ./dietpi-work
        echo "Extracting image..."
        xz -d -k ${{ inputs.image_name }}.img.xz || unxz -k ${{ inputs.image_name }}.img.xz
        ls -la

    - name: Download DietPi files
      shell: bash
      run: |
        cd ./dietpi-work
        echo "========================================"
        echo "Downloading DietPi files from GitHub"
        echo "========================================"

        # Create temp directory for DietPi files
        mkdir -p dietpi-files/boot/dietpi
        mkdir -p dietpi-files/boot/dietpi/func

        # Download main DietPi boot files
        DIETPI_REPO="https://raw.githubusercontent.com/MichaIng/DietPi/master"

        echo "Downloading dietpi.txt..."
        wget -q -O dietpi-files/boot/dietpi.txt "${DIETPI_REPO}/dietpi.txt"

        echo "Downloading dietpi-globals..."
        wget -q -O dietpi-files/boot/dietpi/dietpi-globals "${DIETPI_REPO}/dietpi/dietpi-globals"

        echo "Downloading func scripts..."
        wget -q -O dietpi-files/boot/dietpi/func/dietpi-banner "${DIETPI_REPO}/dietpi/func/dietpi-banner"
        wget -q -O dietpi-files/boot/dietpi/func/dietpi-firstboot "${DIETPI_REPO}/dietpi/func/dietpi-firstboot"
        wget -q -O dietpi-files/boot/dietpi/func/dietpi-login "${DIETPI_REPO}/dietpi/func/dietpi-login"
        wget -q -O dietpi-files/boot/dietpi/func/dietpi-postboot "${DIETPI_REPO}/dietpi/func/dietpi-postboot"
        wget -q -O dietpi-files/boot/dietpi/func/dietpi-preboot "${DIETPI_REPO}/dietpi/func/dietpi-preboot"
        wget -q -O dietpi-files/boot/dietpi/func/dietpi-notify "${DIETPI_REPO}/dietpi/func/dietpi-notify"
        wget -q -O dietpi-files/boot/dietpi/func/dietpi-obtain_hw_model "${DIETPI_REPO}/dietpi/func/dietpi-obtain_hw_model"
        wget -q -O dietpi-files/boot/dietpi/func/dietpi-set_software "${DIETPI_REPO}/dietpi/func/dietpi-set_software"
        wget -q -O dietpi-files/boot/dietpi/func/dietpi-ramdisk "${DIETPI_REPO}/dietpi/func/dietpi-ramdisk"

        echo "Downloading main dietpi scripts..."
        wget -q -O dietpi-files/boot/dietpi/dietpi-software "${DIETPI_REPO}/dietpi/dietpi-software"
        wget -q -O dietpi-files/boot/dietpi/dietpi-config "${DIETPI_REPO}/dietpi/dietpi-config"
        wget -q -O dietpi-files/boot/dietpi/dietpi-update "${DIETPI_REPO}/dietpi/dietpi-update"
        wget -q -O dietpi-files/boot/dietpi/dietpi-autostart "${DIETPI_REPO}/dietpi/dietpi-autostart"
        wget -q -O dietpi-files/boot/dietpi/dietpi-services "${DIETPI_REPO}/dietpi/dietpi-services"
        wget -q -O dietpi-files/boot/dietpi/dietpi-drive_manager "${DIETPI_REPO}/dietpi/dietpi-drive_manager"
        wget -q -O dietpi-files/boot/dietpi/dietpi-cron "${DIETPI_REPO}/dietpi/dietpi-cron"
        wget -q -O dietpi-files/boot/dietpi/dietpi-cleaner "${DIETPI_REPO}/dietpi/dietpi-cleaner"

        # Download the installer script (will run on first boot)
        echo "Downloading dietpi-installer..."
        wget -q -O dietpi-files/dietpi-installer "${DIETPI_REPO}/.build/images/dietpi-installer"

        echo "DietPi files downloaded successfully"
        ls -laR dietpi-files/

    - name: Mount image and prepare DietPi
      shell: bash
      run: |
        set -e
        cd ./dietpi-work
        IMG_FILE="${{ inputs.image_name }}.img"

        echo "========================================"
        echo "Preparing DietPi-Ready Image"
        echo "HW_MODEL: ${{ inputs.hw_model }}"
        echo "DISTRO_TARGET: ${{ inputs.distro_target }}"
        echo "========================================"

        echo "Setting up loop device..."
        sudo losetup -fP "$IMG_FILE"
        LOOP_DEV=$(sudo losetup -j "$IMG_FILE" | cut -d: -f1)
        echo "Loop device: $LOOP_DEV"

        # Find root partition (usually p1 or p2)
        if [ -b "${LOOP_DEV}p2" ]; then
          ROOT_PART="${LOOP_DEV}p2"
          BOOT_PART="${LOOP_DEV}p1"
        else
          ROOT_PART="${LOOP_DEV}p1"
          BOOT_PART=""
        fi
        echo "Root partition: $ROOT_PART"
        echo "Boot partition: $BOOT_PART"

        # Mount root filesystem
        sudo mkdir -p /mnt/dietpi
        sudo mount "$ROOT_PART" /mnt/dietpi

        # Mount boot if separate
        if [ -n "$BOOT_PART" ]; then
          sudo mkdir -p /mnt/dietpi/boot
          sudo mount "$BOOT_PART" /mnt/dietpi/boot
        fi

        # ========================================
        # Copy DietPi files to image
        # ========================================
        echo "Copying DietPi files to image..."

        # Copy boot files
        sudo cp -r dietpi-files/boot/* /mnt/dietpi/boot/

        # Make scripts executable
        sudo chmod +x /mnt/dietpi/boot/dietpi/func/*
        sudo chmod +x /mnt/dietpi/boot/dietpi/dietpi-*

        # Copy installer to /root
        sudo cp dietpi-files/dietpi-installer /mnt/dietpi/root/dietpi-installer
        sudo chmod +x /mnt/dietpi/root/dietpi-installer

        # ========================================
        # Create DietPi state files
        # ========================================
        echo "Creating DietPi state files..."
        sudo mkdir -p /mnt/dietpi/boot/dietpi

        # .hw_model - Hardware model ID
        printf '%s\n' "${{ inputs.hw_model }}" | sudo tee /mnt/dietpi/boot/dietpi/.hw_model > /dev/null
        sudo chmod 644 /mnt/dietpi/boot/dietpi/.hw_model
        echo "Created .hw_model = ${{ inputs.hw_model }}"

        # .install_stage - Stage -1 = first run setup pending
        printf '%s\n' "-1" | sudo tee /mnt/dietpi/boot/dietpi/.install_stage > /dev/null
        sudo chmod 644 /mnt/dietpi/boot/dietpi/.install_stage
        echo "Created .install_stage = -1"

        # .dietpi-autostart_index - 0 = console login
        printf '%s\n' "0" | sudo tee /mnt/dietpi/boot/dietpi/.dietpi-autostart_index > /dev/null
        sudo chmod 644 /mnt/dietpi/boot/dietpi/.dietpi-autostart_index
        echo "Created .dietpi-autostart_index = 0"

        # .update_stage
        printf '%s\n' "0" | sudo tee /mnt/dietpi/boot/dietpi/.update_stage > /dev/null
        sudo chmod 644 /mnt/dietpi/boot/dietpi/.update_stage
        echo "Created .update_stage = 0"

        # .version - DietPi version
        printf '%s\n' "9.9.0" | sudo tee /mnt/dietpi/boot/dietpi/.version > /dev/null
        sudo chmod 644 /mnt/dietpi/boot/dietpi/.version
        echo "Created .version = 9.9.0"

        # ========================================
        # Create first-boot service for DietPi
        # ========================================
        echo "Creating DietPi first-boot service..."

        cat << 'FIRSTBOOT_SCRIPT' | sudo tee /mnt/dietpi/usr/local/bin/dietpi-firstboot-setup.sh > /dev/null
#!/bin/bash
# DietPi First Boot Setup Script
# This runs on real hardware to complete DietPi installation

LOG="/var/log/dietpi-firstboot-setup.log"
exec > >(tee -a "$LOG") 2>&1

echo "========================================"
echo "DietPi First Boot Setup"
echo "Date: $(date)"
echo "========================================"

# Check if already completed
if [[ -f /boot/dietpi/.dietpi-ready-done ]]; then
    echo "DietPi setup already completed, skipping..."
    exit 0
fi

# Detect hardware model (real hardware now!)
echo "Detecting hardware..."
if [[ -f /boot/dietpi/func/dietpi-obtain_hw_model ]]; then
    chmod +x /boot/dietpi/func/dietpi-obtain_hw_model
    /boot/dietpi/func/dietpi-obtain_hw_model
fi

# Source DietPi globals
if [[ -f /boot/dietpi/dietpi-globals ]]; then
    . /boot/dietpi/dietpi-globals
fi

# Run DietPi installer if present
if [[ -f /root/dietpi-installer ]]; then
    echo "Running DietPi installer..."
    chmod +x /root/dietpi-installer

    # Set environment variables
    export GITOWNER="MichaIng"
    export GITBRANCH="master"
    export WIFI_REQUIRED=1
    export IMAGE_CREATOR="Yumi"
    export PREIMAGE_INFO="Armbian"

    /root/dietpi-installer

    # Remove installer after completion
    rm -f /root/dietpi-installer
fi

# Mark as done
touch /boot/dietpi/.dietpi-ready-done
echo "DietPi first boot setup completed!"

# Disable this service
systemctl disable dietpi-firstboot-setup.service 2>/dev/null

# Reboot to apply all changes
echo "Rebooting in 5 seconds..."
sleep 5
reboot
FIRSTBOOT_SCRIPT

        sudo chmod +x /mnt/dietpi/usr/local/bin/dietpi-firstboot-setup.sh

        # Create systemd service
        cat << 'SYSTEMD_SERVICE' | sudo tee /mnt/dietpi/etc/systemd/system/dietpi-firstboot-setup.service > /dev/null
[Unit]
Description=DietPi First Boot Setup
After=network-online.target
Wants=network-online.target
Before=getty@tty1.service
ConditionPathExists=!/boot/dietpi/.dietpi-ready-done

[Service]
Type=oneshot
ExecStart=/usr/local/bin/dietpi-firstboot-setup.sh
RemainAfterExit=yes
StandardOutput=journal+console
StandardError=journal+console

[Install]
WantedBy=multi-user.target
SYSTEMD_SERVICE

        # Enable the service
        sudo ln -sf /etc/systemd/system/dietpi-firstboot-setup.service \
            /mnt/dietpi/etc/systemd/system/multi-user.target.wants/dietpi-firstboot-setup.service

        echo "First-boot service created and enabled"

        # ========================================
        # Verify installation
        # ========================================
        echo "=== Verification ==="
        echo "DietPi files in /boot/dietpi:"
        ls -la /mnt/dietpi/boot/dietpi/
        echo ""
        echo "State files:"
        cat /mnt/dietpi/boot/dietpi/.hw_model
        cat /mnt/dietpi/boot/dietpi/.install_stage
        echo "=== End Verification ==="

        # ========================================
        # Cleanup and unmount
        # ========================================
        echo "Unmounting filesystems..."
        sync
        sudo umount /mnt/dietpi/boot 2>/dev/null || true
        sudo umount /mnt/dietpi 2>/dev/null || true

        # Detach loop device
        sudo losetup -d "$LOOP_DEV"

        echo "========================================"
        echo "DietPi-Ready image prepared!"
        echo "========================================"

    - name: Rename and compress DietPi-Ready image
      shell: bash
      run: |
        cd ./dietpi-work
        # Transform name: add -DietPi-Ready suffix
        BOARD=$(echo "${{ inputs.image_name }}" | sed 's/^Yumi-\([^-]*\)-.*/\1/')
        REST=$(echo "${{ inputs.image_name }}" | sed 's/^Yumi-[^-]*-//')
        DIETPI_NAME="${BOARD}-DietPi-Ready-${REST}"
        echo "Renaming to: ${DIETPI_NAME}"
        mv "${{ inputs.image_name }}.img" "${DIETPI_NAME}.img"

        echo "Compressing DietPi-Ready image..."
        xz -efkvzT0 "${DIETPI_NAME}.img"

        echo "Calculating checksum..."
        sha256sum "${DIETPI_NAME}.img.xz" > "${DIETPI_NAME}.img.xz.sha256"

        echo "DIETPI_IMAGE_NAME=${DIETPI_NAME}" >> $GITHUB_ENV
        ls -la

    - name: Upload DietPi-Ready image
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.DIETPI_IMAGE_NAME }}.img.xz
        path: ./dietpi-work/${{ env.DIETPI_IMAGE_NAME }}.img.xz

    - name: Upload DietPi-Ready checksum
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.DIETPI_IMAGE_NAME }}.img.xz.sha256
        path: ./dietpi-work/${{ env.DIETPI_IMAGE_NAME }}.img.xz.sha256
