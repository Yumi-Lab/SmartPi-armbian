name: "Prepare DietPi-Ready Image (100% Offline)"
author: "Yumi"
description: "Prepare Armbian image with full DietPi pre-installed - NO internet needed at first boot"
inputs:
  image_name:
    description: "Name of the Armbian image artifact to prepare"
    required: true
  hw_model:
    description: "DietPi hardware model ID (25 = Generic Allwinner H3)"
    required: false
    default: "25"
  distro_target:
    description: "Debian version (6=Bullseye, 7=Bookworm, 8=Trixie)"
    required: false
    default: "8"

runs:
  using: "composite"
  steps:
    - name: Install dependencies
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y parted kpartx xz-utils wget git

    - name: Download Armbian image artifact
      uses: actions/download-artifact@v4
      with:
        name: ${{ inputs.image_name }}.img.xz
        path: ./dietpi-work

    - name: Extract image
      shell: bash
      run: |
        cd ./dietpi-work
        echo "Extracting image..."
        xz -d -k ${{ inputs.image_name }}.img.xz || unxz -k ${{ inputs.image_name }}.img.xz
        ls -la

    - name: Clone complete DietPi repository
      shell: bash
      run: |
        cd ./dietpi-work
        echo "========================================"
        echo "Cloning COMPLETE DietPi repository for 100% offline install"
        echo "========================================"
        git clone --depth=1 https://github.com/MichaIng/DietPi.git dietpi-repo
        echo "DietPi repository cloned"
        echo "Version: $(cat dietpi-repo/.version 2>/dev/null || echo 'unknown')"
        ls -la dietpi-repo/

    - name: Mount image and install DietPi (100% Offline with Auto-Install)
      shell: bash
      run: |
        set -e
        cd ./dietpi-work
        IMG_FILE="${{ inputs.image_name }}.img"

        echo "========================================"
        echo "Installing DietPi Auto-Install System (100% OFFLINE)"
        echo "HW_MODEL: ${{ inputs.hw_model }}"
        echo "DISTRO_TARGET: ${{ inputs.distro_target }}"
        echo "Strategy: Copy full DietPi repo + auto-install service"
        echo "========================================"

        echo "Setting up loop device..."
        sudo losetup -fP "$IMG_FILE"
        LOOP_DEV=$(sudo losetup -j "$IMG_FILE" | cut -d: -f1)
        echo "Loop device: $LOOP_DEV"

        # Find root partition
        if [ -b "${LOOP_DEV}p2" ]; then
          ROOT_PART="${LOOP_DEV}p2"
          BOOT_PART="${LOOP_DEV}p1"
        else
          ROOT_PART="${LOOP_DEV}p1"
          BOOT_PART=""
        fi
        echo "Root partition: $ROOT_PART"

        # Mount filesystems
        sudo mkdir -p /mnt/dietpi
        sudo mount "$ROOT_PART" /mnt/dietpi
        if [ -n "$BOOT_PART" ]; then
          sudo mkdir -p /mnt/dietpi/boot
          sudo mount "$BOOT_PART" /mnt/dietpi/boot
        fi

        # ========================================
        # NOUVELLE APPROCHE: Copy FULL DietPi repo + Auto-Install service
        # ========================================
        echo "========================================="
        echo "NEW STRATEGY: 100% Offline Auto-Install"
        echo "========================================="

        # 1. Copy COMPLETE DietPi repository to /opt/dietpi-source (100% offline)
        echo "Copying complete DietPi repository to /opt/dietpi-source..."
        sudo mkdir -p /mnt/dietpi/opt
        sudo cp -r dietpi-repo /mnt/dietpi/opt/dietpi-source
        echo "DietPi repository copied ($(du -sh /mnt/dietpi/opt/dietpi-source | awk '{print $1}'))"

        # 2. Install DietPi Auto-Install script
        echo "Installing DietPi Auto-Install script..."
        local autoInstallSrc="../build-configs/userpatches/overlay/dietpi-auto-install.sh"
        local autoInstallDest="/mnt/dietpi/usr/local/bin/dietpi-auto-install.sh"
        if [[ -f "$autoInstallSrc" ]]; then
          sudo cp "$autoInstallSrc" "$autoInstallDest"
          sudo chmod 755 "$autoInstallDest"
          echo "Auto-install script installed to $autoInstallDest"
        else
          echo "WARNING: dietpi-auto-install.sh not found at $autoInstallSrc"
        fi

        # 3. Install DietPi Auto-Install service
        echo "Installing DietPi Auto-Install systemd service..."
        local serviceSrc="../build-configs/userpatches/overlay/dietpi-auto-install.service"
        local serviceDest="/mnt/dietpi/etc/systemd/system/dietpi-auto-install.service"
        if [[ -f "$serviceSrc" ]]; then
          sudo cp "$serviceSrc" "$serviceDest"
          sudo chmod 644 "$serviceDest"
          echo "Auto-install service installed"
        else
          echo "WARNING: dietpi-auto-install.service not found at $serviceSrc"
        fi

        # 4. Enable the auto-install service
        echo "Enabling DietPi Auto-Install service..."
        sudo mkdir -p /mnt/dietpi/etc/systemd/system/multi-user.target.wants
        sudo ln -sf /etc/systemd/system/dietpi-auto-install.service \
          /mnt/dietpi/etc/systemd/system/multi-user.target.wants/dietpi-auto-install.service

        # 5. Create minimal DietPi directories for compatibility
        echo "Creating minimal DietPi directory structure..."
        sudo mkdir -p /mnt/dietpi/boot/dietpi
        sudo mkdir -p /mnt/dietpi/var/log/dietpi

        # NOTE: All DietPi files, services, and configurations will be created
        # by the official DietPi installer at first boot (via auto-install service).
        # No manual file creation needed here!

        echo "========================================="
        echo "Auto-Install setup complete!"
        echo "DietPi will be installed automatically on first boot"
        echo "========================================="

        # Verification
        echo "=== Auto-Install Verification ==="
        echo "DietPi source repository:"
        du -sh /mnt/dietpi/opt/dietpi-source
        echo ""
        echo "Auto-install script:"
        ls -lh /mnt/dietpi/usr/local/bin/dietpi-auto-install.sh
        echo ""
        echo "Auto-install service:"
        ls -lh /mnt/dietpi/etc/systemd/system/dietpi-auto-install.service
        echo ""
        echo "Service enabled:"
        ls -l /mnt/dietpi/etc/systemd/system/multi-user.target.wants/dietpi-auto-install.service
        echo ""
        echo "✓ DietPi will be installed automatically on first boot"
        echo "✓ Installation is 100% offline (all sources included)"
        echo "=== End Verification ==="

        # Cleanup and unmount
        echo "Unmounting filesystems..."
        sync
        sudo umount /mnt/dietpi/boot 2>/dev/null || true
        sudo umount /mnt/dietpi 2>/dev/null || true
        sudo losetup -d "$LOOP_DEV"

        echo "========================================"
        echo "DietPi 100% OFFLINE image prepared!"
        echo "========================================"

    - name: Rename and compress DietPi-Ready image
      shell: bash
      run: |
        cd ./dietpi-work
        BOARD=$(echo "${{ inputs.image_name }}" | sed 's/^Yumi-\([^-]*\)-.*/\1/')
        REST=$(echo "${{ inputs.image_name }}" | sed 's/^Yumi-[^-]*-//')
        DIETPI_NAME="${BOARD}-DietPi-Ready-${REST}"
        echo "Renaming to: ${DIETPI_NAME}"
        mv "${{ inputs.image_name }}.img" "${DIETPI_NAME}.img"

        echo "Compressing DietPi-Ready image..."
        xz -efkvzT0 "${DIETPI_NAME}.img"

        echo "Calculating checksum..."
        sha256sum "${DIETPI_NAME}.img.xz" > "${DIETPI_NAME}.img.xz.sha256"

        echo "DIETPI_IMAGE_NAME=${DIETPI_NAME}" >> $GITHUB_ENV
        ls -la

    - name: Upload DietPi-Ready image
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.DIETPI_IMAGE_NAME }}.img.xz
        path: ./dietpi-work/${{ env.DIETPI_IMAGE_NAME }}.img.xz

    - name: Upload DietPi-Ready checksum
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.DIETPI_IMAGE_NAME }}.img.xz.sha256
        path: ./dietpi-work/${{ env.DIETPI_IMAGE_NAME }}.img.xz.sha256
