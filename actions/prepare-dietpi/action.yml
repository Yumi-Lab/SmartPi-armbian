name: "Prepare DietPi-Ready Image (100% Offline)"
author: "Yumi"
description: "Prepare Armbian image with full DietPi pre-installed - NO internet needed at first boot"
inputs:
  image_name:
    description: "Name of the Armbian image artifact to prepare"
    required: true
  hw_model:
    description: "DietPi hardware model ID (25 = Generic Allwinner H3)"
    required: false
    default: "25"
  distro_target:
    description: "Debian version (6=Bullseye, 7=Bookworm, 8=Trixie)"
    required: false
    default: "8"

runs:
  using: "composite"
  steps:
    - name: Install dependencies
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y parted kpartx xz-utils wget git

    - name: Download Armbian image artifact
      uses: actions/download-artifact@v4
      with:
        name: ${{ inputs.image_name }}.img.xz
        path: ./dietpi-work

    - name: Extract image
      shell: bash
      run: |
        cd ./dietpi-work
        echo "Extracting image..."
        xz -d -k ${{ inputs.image_name }}.img.xz || unxz -k ${{ inputs.image_name }}.img.xz
        ls -la

    - name: Clone complete DietPi repository
      shell: bash
      run: |
        cd ./dietpi-work
        echo "========================================"
        echo "Cloning COMPLETE DietPi repository for 100% offline install"
        echo "========================================"
        git clone --depth=1 https://github.com/MichaIng/DietPi.git dietpi-repo
        echo "DietPi repository cloned"
        echo "Version: $(cat dietpi-repo/.version 2>/dev/null || echo 'unknown')"
        ls -la dietpi-repo/

    - name: Mount image and install DietPi (100% Offline)
      shell: bash
      run: |
        set -e
        cd ./dietpi-work
        IMG_FILE="${{ inputs.image_name }}.img"

        echo "========================================"
        echo "Installing DietPi (100% OFFLINE)"
        echo "HW_MODEL: ${{ inputs.hw_model }}"
        echo "DISTRO_TARGET: ${{ inputs.distro_target }}"
        echo "========================================"

        echo "Setting up loop device..."
        sudo losetup -fP "$IMG_FILE"
        LOOP_DEV=$(sudo losetup -j "$IMG_FILE" | cut -d: -f1)
        echo "Loop device: $LOOP_DEV"

        # Find root partition
        if [ -b "${LOOP_DEV}p2" ]; then
          ROOT_PART="${LOOP_DEV}p2"
          BOOT_PART="${LOOP_DEV}p1"
        else
          ROOT_PART="${LOOP_DEV}p1"
          BOOT_PART=""
        fi
        echo "Root partition: $ROOT_PART"

        # Mount filesystems
        sudo mkdir -p /mnt/dietpi
        sudo mount "$ROOT_PART" /mnt/dietpi
        if [ -n "$BOOT_PART" ]; then
          sudo mkdir -p /mnt/dietpi/boot
          sudo mount "$BOOT_PART" /mnt/dietpi/boot
        fi

        # Create all DietPi directories
        echo "Creating DietPi directory structure..."
        sudo mkdir -p /mnt/dietpi/boot/dietpi
        sudo mkdir -p /mnt/dietpi/boot/dietpi/func
        sudo mkdir -p /mnt/dietpi/boot/dietpi/.hw_model.d
        sudo mkdir -p /mnt/dietpi/etc/bashrc.d
        sudo mkdir -p /mnt/dietpi/usr/local/sbin
        sudo mkdir -p /mnt/dietpi/var/lib/dietpi
        sudo mkdir -p /mnt/dietpi/var/lib/dietpi/dietpi-software
        sudo mkdir -p /mnt/dietpi/var/lib/dietpi/dietpi-software/installed
        sudo mkdir -p /mnt/dietpi/var/tmp/dietpi/logs
        sudo mkdir -p /mnt/dietpi/var/log/dietpi

        # Copy ALL DietPi files from repo
        echo "Installing ALL DietPi files..."
        sudo cp dietpi-repo/dietpi.txt /mnt/dietpi/boot/
        echo "Copying /boot/dietpi scripts..."
        sudo cp -r dietpi-repo/dietpi/* /mnt/dietpi/boot/dietpi/
        echo "Copying func scripts..."
        if [[ -d dietpi-repo/dietpi/func ]]; then
          sudo cp -r dietpi-repo/dietpi/func/* /mnt/dietpi/boot/dietpi/func/
        fi
        sudo chmod +x /mnt/dietpi/boot/dietpi/dietpi-* 2>/dev/null || true
        sudo chmod +x /mnt/dietpi/boot/dietpi/func/* 2>/dev/null || true

        # Install DietPi commands to /usr/local/sbin
        echo "Installing DietPi commands to /usr/local/sbin..."
        for script in dietpi-repo/dietpi/dietpi-*; do
          if [[ -f "$script" ]]; then
            name=$(basename "$script")
            sudo cp "$script" "/mnt/dietpi/usr/local/sbin/$name"
            sudo chmod +x "/mnt/dietpi/usr/local/sbin/$name"
          fi
        done

        if [[ -f dietpi-repo/dietpi/dietpi-globals ]]; then
          sudo cp dietpi-repo/dietpi/dietpi-globals /mnt/dietpi/boot/dietpi/
          sudo chmod +x /mnt/dietpi/boot/dietpi/dietpi-globals
        fi

        # Install shell integration
        echo "Installing shell integration..."
        if [[ -f dietpi-repo/.bashrc ]]; then
          sudo cp dietpi-repo/.bashrc /mnt/dietpi/root/.bashrc.dietpi
        fi

        # Create dietpi.bash for bash integration
        sudo tee /mnt/dietpi/etc/bashrc.d/dietpi.bash > /dev/null << 'EOFBASH'
        # DietPi bash integration
        test -f /boot/dietpi/.hw_model && export G_HW_MODEL=$(cat /boot/dietpi/.hw_model)
        test -f /boot/dietpi/.install_stage && export G_DIETPI_INSTALL_STAGE=$(cat /boot/dietpi/.install_stage)
        test -f /boot/dietpi/dietpi-globals && . /boot/dietpi/dietpi-globals
        EOFBASH
        sudo chmod 644 /mnt/dietpi/etc/bashrc.d/dietpi.bash

        # Create DietPi state files
        echo "Creating DietPi state files..."
        DIETPI_VERSION=$(cat dietpi-repo/.version 2>/dev/null || echo "9.9.0")

        # Determine architecture and distro info
        # HW_MODEL 25 = Generic Allwinner H3 (OrangePi, NanoPi, etc.)
        HW_MODEL="${{ inputs.hw_model }}"
        DISTRO_TARGET="${{ inputs.distro_target }}"

        # Map distro target to name
        case "$DISTRO_TARGET" in
          6) DISTRO_NAME="bullseye" ;;
          7) DISTRO_NAME="bookworm" ;;
          8) DISTRO_NAME="trixie" ;;
          *) DISTRO_NAME="bookworm" ;;
        esac

        # Create .hw_model as a sourceable bash file (DietPi expects this format!)
        sudo tee /mnt/dietpi/boot/dietpi/.hw_model > /dev/null << EOFHWMODEL
        G_HW_MODEL=$HW_MODEL
        G_HW_MODEL_NAME='Generic Allwinner H3'
        G_HW_ARCH=2
        G_HW_ARCH_NAME='armv7l'
        G_HW_CPUID=0
        G_HW_CPU_CORES=4
        G_DISTRO=$DISTRO_TARGET
        G_DISTRO_NAME='$DISTRO_NAME'
        G_ROOTFS_DEV='/dev/mmcblk0p1'
        G_HW_UUID=''
        EOFHWMODEL
        sudo chmod 644 /mnt/dietpi/boot/dietpi/.hw_model

        printf '%s' "2" | sudo tee /mnt/dietpi/boot/dietpi/.install_stage > /dev/null
        sudo chmod 644 /mnt/dietpi/boot/dietpi/.install_stage

        printf '%s' "0" | sudo tee /mnt/dietpi/boot/dietpi/.dietpi-autostart_index > /dev/null
        sudo chmod 644 /mnt/dietpi/boot/dietpi/.dietpi-autostart_index

        printf '%s' "0" | sudo tee /mnt/dietpi/boot/dietpi/.update_stage > /dev/null
        sudo chmod 644 /mnt/dietpi/boot/dietpi/.update_stage

        printf '%s' "$DIETPI_VERSION" | sudo tee /mnt/dietpi/boot/dietpi/.version > /dev/null
        sudo chmod 644 /mnt/dietpi/boot/dietpi/.version

        printf '%s' "0" | sudo tee /mnt/dietpi/boot/dietpi/.dietpi-update.check > /dev/null

        # Configure dietpi.txt defaults
        echo "Configuring dietpi.txt..."
        if [[ -f /mnt/dietpi/boot/dietpi.txt ]]; then
          sudo sed -i "s/^AUTO_SETUP_NET_WIFI_ENABLED=.*/AUTO_SETUP_NET_WIFI_ENABLED=1/" /mnt/dietpi/boot/dietpi.txt
          sudo sed -i "s/^AUTO_SETUP_HEADLESS=.*/AUTO_SETUP_HEADLESS=1/" /mnt/dietpi/boot/dietpi.txt
          sudo sed -i "s/^AUTO_SETUP_LOCALE=.*/AUTO_SETUP_LOCALE=fr_FR.UTF-8/" /mnt/dietpi/boot/dietpi.txt
          sudo sed -i "s/^AUTO_SETUP_KEYBOARD_LAYOUT=.*/AUTO_SETUP_KEYBOARD_LAYOUT=fr/" /mnt/dietpi/boot/dietpi.txt
          sudo sed -i "s|^AUTO_SETUP_TIMEZONE=.*|AUTO_SETUP_TIMEZONE=Europe/Paris|" /mnt/dietpi/boot/dietpi.txt
          sudo sed -i "s/^AUTO_SETUP_AUTOMATED=.*/AUTO_SETUP_AUTOMATED=1/" /mnt/dietpi/boot/dietpi.txt
          sudo sed -i "s/^AUTO_SETUP_ACCEPT_LICENSE=.*/AUTO_SETUP_ACCEPT_LICENSE=1/" /mnt/dietpi/boot/dietpi.txt
        fi

        # Install DietPi systemd services
        echo "Installing DietPi systemd services..."

        sudo tee /mnt/dietpi/etc/systemd/system/dietpi-boot.service > /dev/null << 'EOFSERVICE1'
        [Unit]
        Description=DietPi Boot Tasks
        After=local-fs.target
        Before=network-online.target

        [Service]
        Type=oneshot
        ExecStart=/bin/bash -c 'test -f /boot/dietpi/func/dietpi-preboot && /boot/dietpi/func/dietpi-preboot || true'
        RemainAfterExit=yes
        StandardOutput=journal+console

        [Install]
        WantedBy=multi-user.target
        EOFSERVICE1

        sudo tee /mnt/dietpi/etc/systemd/system/dietpi-postboot.service > /dev/null << 'EOFSERVICE2'
        [Unit]
        Description=DietPi Post-Boot Tasks
        After=network-online.target

        [Service]
        Type=oneshot
        ExecStart=/bin/bash -c 'test -f /boot/dietpi/func/dietpi-postboot && /boot/dietpi/func/dietpi-postboot || true'
        RemainAfterExit=yes
        StandardOutput=journal+console

        [Install]
        WantedBy=multi-user.target
        EOFSERVICE2

        sudo tee /mnt/dietpi/etc/systemd/system/dietpi-ramdisk.service > /dev/null << 'EOFSERVICE3'
        [Unit]
        Description=DietPi RAMdisk/Log Setup
        DefaultDependencies=no
        After=local-fs.target
        Before=sysinit.target

        [Service]
        Type=oneshot
        ExecStart=/bin/bash -c 'test -f /boot/dietpi/func/dietpi-ramdisk && /boot/dietpi/func/dietpi-ramdisk 0 || true'
        ExecStop=/bin/bash -c 'test -f /boot/dietpi/func/dietpi-ramdisk && /boot/dietpi/func/dietpi-ramdisk 1 || true'
        RemainAfterExit=yes

        [Install]
        WantedBy=sysinit.target
        EOFSERVICE3

        # Enable services
        sudo mkdir -p /mnt/dietpi/etc/systemd/system/multi-user.target.wants
        sudo mkdir -p /mnt/dietpi/etc/systemd/system/sysinit.target.wants
        sudo ln -sf /etc/systemd/system/dietpi-boot.service /mnt/dietpi/etc/systemd/system/multi-user.target.wants/dietpi-boot.service
        sudo ln -sf /etc/systemd/system/dietpi-postboot.service /mnt/dietpi/etc/systemd/system/multi-user.target.wants/dietpi-postboot.service
        sudo ln -sf /etc/systemd/system/dietpi-ramdisk.service /mnt/dietpi/etc/systemd/system/sysinit.target.wants/dietpi-ramdisk.service

        # Set root password to 'dietpi'
        echo "Setting default root password to 'dietpi'..."
        ROOT_HASH=$(openssl passwd -6 'dietpi')
        sudo sed -i "s|^root:[^:]*:|root:${ROOT_HASH}:|" /mnt/dietpi/etc/shadow

        # Verification
        echo "=== Verification ==="
        echo "DietPi files in /boot/dietpi:"
        ls -la /mnt/dietpi/boot/dietpi/ | head -20
        echo ""
        echo "DietPi commands in /usr/local/sbin: $(ls /mnt/dietpi/usr/local/sbin/dietpi-* 2>/dev/null | wc -l)"
        echo "State files:"
        echo "  .hw_model: $(cat /mnt/dietpi/boot/dietpi/.hw_model)"
        echo "  .install_stage: $(cat /mnt/dietpi/boot/dietpi/.install_stage)"
        echo "  .version: $(cat /mnt/dietpi/boot/dietpi/.version)"
        echo "Systemd services:"
        ls -la /mnt/dietpi/etc/systemd/system/dietpi-*.service 2>/dev/null || echo "  (none found)"
        echo "=== End Verification ==="

        # Cleanup and unmount
        echo "Unmounting filesystems..."
        sync
        sudo umount /mnt/dietpi/boot 2>/dev/null || true
        sudo umount /mnt/dietpi 2>/dev/null || true
        sudo losetup -d "$LOOP_DEV"

        echo "========================================"
        echo "DietPi 100% OFFLINE image prepared!"
        echo "========================================"

    - name: Rename and compress DietPi-Ready image
      shell: bash
      run: |
        cd ./dietpi-work
        BOARD=$(echo "${{ inputs.image_name }}" | sed 's/^Yumi-\([^-]*\)-.*/\1/')
        REST=$(echo "${{ inputs.image_name }}" | sed 's/^Yumi-[^-]*-//')
        DIETPI_NAME="${BOARD}-DietPi-Ready-${REST}"
        echo "Renaming to: ${DIETPI_NAME}"
        mv "${{ inputs.image_name }}.img" "${DIETPI_NAME}.img"

        echo "Compressing DietPi-Ready image..."
        xz -efkvzT0 "${DIETPI_NAME}.img"

        echo "Calculating checksum..."
        sha256sum "${DIETPI_NAME}.img.xz" > "${DIETPI_NAME}.img.xz.sha256"

        echo "DIETPI_IMAGE_NAME=${DIETPI_NAME}" >> $GITHUB_ENV
        ls -la

    - name: Upload DietPi-Ready image
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.DIETPI_IMAGE_NAME }}.img.xz
        path: ./dietpi-work/${{ env.DIETPI_IMAGE_NAME }}.img.xz

    - name: Upload DietPi-Ready checksum
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.DIETPI_IMAGE_NAME }}.img.xz.sha256
        path: ./dietpi-work/${{ env.DIETPI_IMAGE_NAME }}.img.xz.sha256
