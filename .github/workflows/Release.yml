name: Release Images

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Numéro de version (ex: v1.5.0)"
        required: true
        type: string

jobs:
  create-release:
    name: Créer la Release
    runs-on: ubuntu-latest
    outputs:
      run_id: ${{ steps.get_build.outputs.run_id }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Récupérer l'ID du dernier Build Images réussi
        id: get_build
        run: |
          RUN_ID=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/actions/runs?status=success&branch=develop&per_page=50" | \
            jq -r '[.workflow_runs[] | select(.name == "Build Images")][0].id')
          echo "Dernier Build Images réussi: $RUN_ID"
          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT

      - name: Vérifier si le tag existe déjà
        run: |
          if git rev-parse "refs/tags/${{ github.event.inputs.version }}" >/dev/null 2>&1; then
            echo "Tag déjà existant!"
            exit 1
          fi

      - name: Créer et pousser le Tag Git
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git tag -a "${{ github.event.inputs.version }}" -m "Release ${{ github.event.inputs.version }}"
          git push origin "${{ github.event.inputs.version }}"

      - name: Créer la Release GitHub
        run: |
          gh release create "${{ github.event.inputs.version }}" \
            --title "Release ${{ github.event.inputs.version }}" \
            --notes "Nouvelle version ${{ github.event.inputs.version }} disponible"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  upload-files:
    name: Upload des fichiers vers la Release
    runs-on: ubuntu-latest
    needs: create-release
    steps:
      - name: Upload artifacts one by one directly to release
        run: |
          RUN_ID="${{ needs.create-release.outputs.run_id }}"
          echo "Upload depuis le build run: $RUN_ID"

          curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/actions/runs/$RUN_ID/artifacts?per_page=100" | \
            jq -r '.artifacts[] | select(.name | test("\\.txt$") | not) | .archive_download_url + "|" + .name' | \
          while IFS='|' read url name; do
            echo "→ $name"
            curl -sL -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" "$url" -o artifact.zip
            unzip -o artifact.zip "$name"
            rm artifact.zip
            gh release upload "${{ github.event.inputs.version }}" "$name" --clobber
            rm -f "$name"
            echo "✅ $name"
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
